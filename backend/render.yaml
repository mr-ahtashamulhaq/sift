services:
  - type: web
    name: sift-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BRIGHT_DATA_TOKEN
        sync: false
      - key: AIML_API_KEY
        sync: false
      - key: BRIGHT_DATA_SERP_ZONE
        value: serp_api
      - key: BRIGHT_DATA_UNLOCKER_ZONE
        value: unlocker
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        value: https://sift.vercel.app,http://localhost:3000
